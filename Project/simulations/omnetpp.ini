[General]
repeat = 10
seed-set = ${repetition}
network = org.car2x.veins.nodes.Scenario
sim-time-limit = 100s

*.playgroundSizeX = 600m
*.playgroundSizeY = 600m
*.playgroundSizeZ = 50m

# --- TraCI Configuration (SUMO) ---
*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("simulation.launchd.xml")

# --- Mobility ---
*.node[*].veinsmobility.x = 0
*.node[*].veinsmobility.y = 0
*.node[*].veinsmobility.z = 1.895

# --- Application Layer (Beacons) ---
*.node[*].applType = "TraCIDemo11p"
*.node[*].appl.headerLength = 80 bit
*.node[*].appl.sendBeacons = true
*.node[*].appl.dataOnSch = false
*.node[*].appl.beaconInterval = 0.1s

# --- MAC & PHY Layer ---
*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 500m
*.connectionManager.drawMaxIntfDist = false
*.**.nic.mac1609_4.useServiceChannel = false
*.**.nic.mac1609_4.txPower = 20mW
*.**.nic.mac1609_4.bitrate = 6Mbps
*.**.nic.phy80211p.minPowerLevel = -110dBm
*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -98dBm
*.**.nic.phy80211p.usePropagationDelay = true

## --- VECTOR RECORDING ---
**.vector-recording = true
**.scalar-recording = true
*.**.nic.phy80211p.*.vector-recording = true
*.**.nic.mac1609_4.*.vector-recording = true
**.rcvdPower:vector.vector-recording = true
**.snir:vector.vector-recording = true

[Config Scenario1]
description = "Pure Free Space (No ground, no buildings)"
*.annotations.draw = false
*.**.nic.phy80211p.decider = xmldoc("config_1.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config_1.xml")

[Config Scenario2]
description = "Two-Ray Ground (Radio bouncing off asphalt)"
*.annotations.draw = false
*.**.nic.phy80211p.decider = xmldoc("config_2.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config_2.xml")

[Config Scenario3]
description = "Obstacle Shadowing (Buildings block signals)"
*.annotations.draw = true
*.obstacles.obstacles = xmldoc("config_3.xml", "//AnalogueModel[@type='SimpleObstacleShadowing']/obstacles")
*.**.nic.phy80211p.decider = xmldoc("config_3.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config_3.xml")

[Config Scenario4]
extends = Scenario3
*.manager.launchConfig = xmldoc("half_traffic.launchd.xml")

[Config Scenario5]
*.playgroundSizeX = 1100m
*.playgroundSizeY = 200m
*.playgroundSizeZ = 50m
extends = Scenario2
*.manager.launchConfig = xmldoc("straight_road.launchd.xml")




