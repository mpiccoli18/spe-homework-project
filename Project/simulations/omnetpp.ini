[General]
network = org.car2x.veins.nodes.Scenario
sim-time-limit = 100s

# --- TraCI Configuration (SUMO Connection) ---
*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("simulation.sumocfg")

# --- Application Layer (Beacons) ---
*.node[*].applType = "TraCIDemo11p"
*.node[*].appl.headerLength = 80 bit
*.node[*].appl.sendBeacons = true
*.node[*].appl.dataOnSch = false
*.node[*].appl.beaconInterval = 0.1s

# --- MAC and PHY Layer Defaults ---
*.node[*].nic.mac1609_4.useServiceChannel = false
*.node[*].nic.mac1609_4.txPower = 20mW
*.node[*].nic.mac1609_4.bitrate = 6Mbps
*.node[*].nic.phy80211p.usePropagationDelay = true

# --- SCENARIO 1: Pure Free Space (No ground, no buildings) ---
[Config FreeSpace]
description = "Baseline: Free Space Propagation"
*.node[*].nic.phy80211p.analogueModels = xmldoc("config_1.xml")

# --- SCENARIO 2: Two-Ray Ground (Radio bouncing off asphalt) ---
[Config TwoRay]
description = "Interference: Two-Ray Ground Model"
*.node[*].nic.phy80211p.analogueModels = xmldoc("config_2.xml")

# --- SCENARIO 3: Obstacle Shadowing (Buildings block signals) ---
[Config Shadowing]
description = "Realism: Obstacle Shadowing + Two-Ray"
*.node[*].nic.phy80211p.analogueModels = xmldoc("config_3.xml")
*.obstacles.obstacles = xmldoc("buildings.poly.xml")